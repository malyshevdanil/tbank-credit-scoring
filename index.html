<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кредитный скоринг</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 36px 40px;
      width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
      margin-top: 16px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: #4f8ef7;
    }

    button {
      margin-top: 28px;
      width: 100%;
      padding: 13px;
      background: #4f8ef7;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #3a7de0; }
    button:disabled { background: #aaa; cursor: default; }

    #result {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      display: none;
    }

    .approved { background: #e6f9ee; color: #1a7a3f; }
    .rejected { background: #fde8e8; color: #c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Кредитный скоринг</h1>

    <label>Возраст</label>
    <input type="number" id="age" placeholder="Например: 35" min="18" max="100">

    <label>Доход (тыс. руб./мес.)</label>
    <input type="number" id="income" placeholder="Например: 80 = 80 000 руб." min="0">

    <label>Образование</label>
    <select id="education">
      <option value="0">Нет высшего</option>
      <option value="1">Высшее</option>
    </select>

    <label>Занятость</label>
    <select id="work">
      <option value="0">Нестабильная</option>
      <option value="1">Стабильная</option>
    </select>

    <label>Автомобиль</label>
    <select id="car">
      <option value="0">Нет</option>
      <option value="1">Есть</option>
    </select>

    <button id="btn" onclick="predict()">Проверить</button>

    <div id="result"></div>
  </div>

  <script>
    async function predict() {
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');

      const age = parseInt(document.getElementById('age').value);
      const income = parseInt(document.getElementById('income').value);
      const education = parseInt(document.getElementById('education').value);
      const work = parseInt(document.getElementById('work').value);
      const car = parseInt(document.getElementById('car').value);

      if (!age || !income || isNaN(work)) {
        alert('Заполните все поля');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Загрузка...';
      result.style.display = 'none';

      try {
        const response = await fetch('http://localhost:8080/score', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ age, income, education, work, car })
        });

        const data = await response.json();

        result.style.display = 'block';
        if (data.approved) {
          result.className = 'approved';
          result.textContent = '✓ Высокая вероятность одобрения';
        } else {
          result.className = 'rejected';
          result.textContent = '✗ Рекомендуем улучшить кредитную историю';
        }
      } catch (e) {
        alert('Ошибка: сервер недоступен. Убедитесь, что API запущен.');
      }

      btn.disabled = false;
      btn.textContent = 'Проверить';
    }
  </script>
</body>
</html>
